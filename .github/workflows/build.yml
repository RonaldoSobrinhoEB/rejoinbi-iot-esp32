name: Build firmware

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Build ESP32 firmware
        run: platformio run -e esp32dev
      - name: Package tagged source
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          package="RejoinBI-IOT-ESP32-${GITHUB_REF_NAME}"
          mkdir -p "dist/${package}"
          cp -R .github src .gitignore CHANGELOG.md LICENSE platformio.ini README.md "dist/${package}/"
          cd dist
          zip -r "${package}.zip" "${package}"
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "dist/RejoinBI-IOT-ESP32-${GITHUB_REF_NAME}.zip"
          --title "Rejoin BI IoT ESP32 ${GITHUB_REF_NAME}"
          --generate-notes
