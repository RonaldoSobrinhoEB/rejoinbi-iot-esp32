name: Build firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Build ESP32 firmware
        run: platformio run -e esp32dev
